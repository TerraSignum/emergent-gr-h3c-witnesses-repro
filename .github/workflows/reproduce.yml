name: reproduce-h3c-witnesses

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  reproduce:
    name: Reproduce on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pytest numpy; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
        shell: bash

      - name: Run pytest
        run: pytest -v

      - name: Upload test artifacts (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: outputs/
          if-no-files-found: ignore
          retention-days: 14
